apiVersion: v1
kind: Service
metadata:
  name: {{ include "oncall.fullname" . }}
  labels: {{- include "oncall.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "oncall.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
